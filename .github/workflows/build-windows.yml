name: Build Windows CPU Binary

on:
  workflow_dispatch:
  push:
    branches: [build-windows]
    paths-ignore:
      - '*.md'
      - '*.txt'
      - 'assets/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install PyQt5 opencv-python-headless numpy tqdm requests
          pip install pyinstaller

      - name: Verify installations
        run: |
          python -c "import torch; print(f'torch {torch.__version__}')"
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import cv2; print(f'OpenCV {cv2.__version__}')"

      - name: Create build directory
        run: |
          mkdir build
          xcopy /E /I src build\src
          copy logo.ico build\
          copy scripts\patch_for_build.py build\
          mkdir build\models

      - name: Patch source for frozen binary
        run: |
          python build\patch_for_build.py

      - name: Build with PyInstaller (onedir)
        run: |
          cd build
          pyinstaller ^
            --onedir ^
            --name klarity ^
            --icon logo.ico ^
            --console ^
            --noconfirm ^
            --clean ^
            --add-data "logo.png;." ^
            src\klarity.py

      - name: Create cli.bat
        run: |
          cd build\dist\klarity
          echo @echo off > cli.bat
          echo REM Klarity - Launch interactive CLI mode >> cli.bat
          echo "%~dp0klarity.exe" cli >> cli.bat
          echo. >> cli.bat

      - name: Create install.bat
        run: |
          cd build\dist\klarity
          powershell -Command "(Get-Content install.bat.tmpl) -replace '{{KLARITY_DIR}}', '%~dp0' | Set-Content install.bat"
          del install.bat.tmpl

      - name: Test binary (basic smoke test)
        run: |
          cd build\dist\klarity
          klarity.exe info

      - name: Create ZIP archive
        run: |
          cd build\dist
          powershell -Compress-Archive -Path klarity -DestinationPath klarity-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: klarity-windows-cpu
          path: build/dist/klarity-windows.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd build\dist
          gh release upload ${{ github.ref_name }} klarity-windows.zip --clobber
